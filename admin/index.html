<!doctype html><html><head><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gigspay Admin</title><style>body{font-family:Arial;margin:0;background:#f6f8fb;color:#0f172a}.wrap{max-width:920px;margin:auto;padding:18px}.card{background:#fff;border-radius:18px;padding:18px;margin:12px 0;box-shadow:0 8px 25px #0001}input,select,button{width:100%;padding:12px;margin:6px 0;border-radius:10px;border:1px solid #ddd}button{background:#2563eb;color:white;font-weight:700}</style></head><body><div class="wrap"><h1>Gigspay Admin</h1><div class="card"><h2>Login Admin</h2><input id="email" placeholder="Email admin"><input id="password" type="password" placeholder="Password"><button onclick="login()">Login</button></div><div class="card"><h2>Settings App</h2><input id="appName" placeholder="Nama APK / Nama aplikasi"><input id="logoUrl" placeholder="URL Logo"><select id="theme"><option value="light">Light</option><option value="dark">Dark</option></select><select id="maintenance"><option value="false">Maintenance Off</option><option value="true">Maintenance On</option></select><button onclick="saveSettings()">Simpan Settings</button></div><div class="card"><h2>Reset Password User</h2><input id="resetEmail" placeholder="Email user"><button onclick="resetPassword()">Kirim Email Reset</button></div><div class="card"><h2>Users</h2><button onclick="loadUsers()">Muat User</button><div id="users"></div></div></div><script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script><script src="firebase-config.js"></script><script src="admin.js"></script></body></html>
